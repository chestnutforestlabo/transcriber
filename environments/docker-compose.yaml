services:
  backend:
    container_name: backend_${HOST_UID}
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    build:
      args:
        - BASE_IMAGE=nvidia/cuda:12.2.0-devel-ubuntu22.04
        - PYTHON_VERSION=3.10
        - UID=${HOST_UID}
        - GID=${HOST_GID}
        - USER_NAME=${USER_NAME}
        - PROJECT_NAME=${PROJECT_NAME_ENV}
      context: ../
      dockerfile: environments/DockerfileBackend
    env_file:
      - envs.env
      - transcribe.env
    tty: true
    volumes:
        - ../:/home/${USER_NAME}/${PROJECT_NAME_ENV}
    working_dir: /home/${USER_NAME}/${PROJECT_NAME_ENV}
    ports:
        - 8005:8005
  frontend:
    container_name: frontend_${HOST_UID}
    build:
      context: ../
      dockerfile: environments/DockerfileFrontend
      args:
        - UID=${HOST_UID}
    working_dir: /transcriber
    volumes:
      - ../:/transcriber:cached
      - frontend_node_modules:/transcriber/src/frontend/node_modules
    env_file:
        - envs.env
        - transcribe.env
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development

volumes:
  frontend_node_modules:
